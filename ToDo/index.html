<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>To-Do Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  
</head>

<body class="bg-light d-flex align-items-center justify-content-center vh-100">

<div class="container">
  <div class="row justify-content-center">
    <div class="col-lg-8">

      <div class="card shadow-lg rounded-4 p-4">

        <h2 class="text-center mb-4">To-Do Management</h2>

        <!-- Input Section -->
        <div class="row g-2 mb-3">
          <div class="col-md-4">
            <input type="text" id="taskInput" class="form-control" placeholder="Enter task">
          </div>
          <div class="col-md-2">
            <select id="priority" class="form-select">
              <option value="Low">Low</option>
              <option value="Medium">Medium</option>
              <option value="High">High</option>
            </select>
          </div>
          <div class="col-md-3">
            <input type="date" id="deadline" class="form-control">
          </div>
          <div class="col-md-3">
            <button onclick="addTask()" class="btn btn-primary w-100">Add Task</button>
          </div>
        </div>

        <!-- Filters -->
        <div class="d-flex gap-2 mb-3 flex-wrap">
          <button class="btn btn-outline-secondary" onclick="setFilter('all')">All</button>
          <button class="btn btn-outline-success" onclick="setFilter('completed')">Completed</button>
          <button class="btn btn-outline-warning" onclick="setFilter('pending')">Pending</button>
        </div>

        <!-- Sorting -->
        <div class="d-flex gap-2 mb-3 flex-wrap">
          <button class="btn btn-dark" onclick="sortTasks('priority')">Sort by Priority</button>
          <button class="btn btn-dark" onclick="sortTasks('deadline')">Sort by Deadline</button>
        </div>

        <!-- Counter -->
        <div class="mb-3 text-center">
          <span class="badge bg-dark">Total: <span id="total">0</span></span>
          <span class="badge bg-success">Completed: <span id="completed">0</span></span>
          <span class="badge bg-warning text-dark">Pending: <span id="pending">0</span></span>
        </div>

        <!-- Task List -->
        <div id="taskList"></div>

      </div>

    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
